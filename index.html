<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #F5F4F0;
    --surface:   #FFFFFF;
    --navy:      #2B3745;
    --navy-lt:   #2C4A6E;
    --ink:       #1A1A18;
    --muted:     #7A7870;
    --border:    #E2E0DA;
    --accent:    #C8A96E;
    --danger:    #C0392B;
    --radius:    4px;
    --sidebar-w: 280px;
  }

  html, body { height: 100%; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--ink);
    font-size: 14px;
    line-height: 1.6;
  }

  /* ── HEADER ── */
  header {
    background: #2B3745;
    color: #fff;
    padding: 0 40px;
    height: 64px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
    border-bottom: 2px solid var(--accent);
  }

  .header-left {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .logo-mark {
    width: 36px;
    height: 36px;
    border: 1.5px solid var(--accent);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Cormorant Garamond', serif;
    font-size: 18px;
    color: var(--accent);
    font-weight: 600;
    letter-spacing: 0.5px;
    flex-shrink: 0;
  }

  .institution-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 20px;
    font-weight: 500;
    letter-spacing: 0.3px;
    color: #fff;
  }

  .institution-sub {
    font-size: 11px;
    color: rgba(255,255,255,0.5);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-top: 1px;
  }

  .header-right {
    text-align: right;
  }

  .update-label {
    font-size: 10px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.4);
    margin-bottom: 2px;
  }

  #ultima-actualizacion {
    font-size: 13px;
    color: var(--accent);
    font-weight: 500;
  }

  /* ── LAYOUT ── */
  .layout {
    display: flex;
    height: calc(100vh - 64px);
  }

  /* ── SIDEBAR ── */
  aside {
    width: var(--sidebar-w);
    flex-shrink: 0;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .sidebar-header {
    padding: 24px 24px 16px;
    border-bottom: 1px solid var(--border);
  }

  .sidebar-title {
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    font-weight: 500;
  }

  .sidebar-count {
    font-family: 'Cormorant Garamond', serif;
    font-size: 28px;
    color: var(--navy);
    font-weight: 600;
    line-height: 1;
    margin-top: 4px;
  }

  .sidebar-count span {
    font-size: 13px;
    font-family: 'DM Sans', sans-serif;
    color: var(--muted);
    font-weight: 400;
  }

  .report-list {
    flex: 1;
    overflow-y: auto;
    padding: 8px 0;
  }

  .report-list::-webkit-scrollbar { width: 4px; }
  .report-list::-webkit-scrollbar-track { background: transparent; }
  .report-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .report-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 24px;
    cursor: pointer;
    border-left: 3px solid transparent;
    transition: all 0.15s ease;
    text-decoration: none;
    color: inherit;
  }

  .report-item:hover {
    background: var(--bg);
    border-left-color: var(--border);
  }

  .report-item.active {
    background: #EEF3F9;
    border-left-color: var(--navy);
  }

  .report-item.active .report-date { color: var(--navy-lt); }
  .report-item.active .report-name { color: var(--navy); font-weight: 500; }

  .report-icon {
    width: 32px;
    height-height: 38px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .report-icon svg { opacity: 0.4; }
  .report-item.active .report-icon svg { opacity: 1; }

  .report-info { flex: 1; min-width: 0; }

  .report-date {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.3px;
  }

  .report-name {
    font-size: 13px;
    color: var(--ink);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-top: 1px;
  }

  .badge-nuevo {
    font-size: 9px;
    background: var(--accent);
    color: #fff;
    padding: 2px 6px;
    border-radius: 10px;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    font-weight: 500;
    flex-shrink: 0;
  }

  /* ── MAIN ── */
  main {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background: var(--bg);
  }

  .viewer-bar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 12px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    flex-shrink: 0;
  }

  .viewer-title {
    font-size: 13px;
    color: var(--ink);
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .viewer-title span {
    color: var(--muted);
    font-weight: 400;
    margin-right: 8px;
  }

  .btn-download {
    display: flex;
    align-items: center;
    gap: 6px;
    background: var(--navy);
    color: #fff;
    padding: 7px 16px;
    border-radius: var(--radius);
    font-size: 12px;
    font-weight: 500;
    text-decoration: none;
    white-space: nowrap;
    transition: background 0.15s;
    letter-spacing: 0.3px;
    border: none;
    cursor: pointer;
  }

  .btn-download:hover { background: var(--navy-lt); }

  #pdf-frame {
    flex: 1;
    width: 100%;
    border: none;
    background: #e8e8e8;
  }

  /* ── EMPTY / LOADING ── */
  .state-msg {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: var(--muted);
    gap: 12px;
    padding: 40px;
    text-align: center;
  }

  .state-msg svg { opacity: 0.25; }
  .state-msg p { font-size: 13px; }

  /* ── FOOTER ── */
  footer {
    background: var(--surface);
    border-top: 1px solid var(--border);
    padding: 10px 24px;
    font-size: 11px;
    color: var(--muted);
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-shrink: 0;
  }

  /* ── RESPONSIVE ── */
  @media (max-width: 768px) {
    :root { --sidebar-w: 100%; }
    .layout { flex-direction: column; height: auto; min-height: calc(100vh - 64px); }
    aside { width: 100%; height: auto; max-height: 280px; border-right: none; border-bottom: 1px solid var(--border); }
    main { flex: 1; min-height: 420px; }
    #pdf-frame { min-height: 420px; }
    .header-left img { height: 32px !important; }
    .viewer-bar { flex-wrap: wrap; gap: 8px; }
    .viewer-title { font-size: 12px; max-width: 180px; }
    footer { flex-direction: column; gap: 4px; text-align: center; }
  }
</style>
</head>

      <div class="sidebar-count" id="sidebar-count" style="display:none;">
        — <span>informes</span>
      </div>
    </div>
    <div class="report-list" id="report-list">
      <div class="state-msg">
        <p>Cargando informes...</p>
      </div>
    </div>
  </aside>

  <main>
    <div class="viewer-bar">
      <div class="viewer-title">
        <span>Visualizando</span>
        <span id="viewer-nombre">—</span>
      </div>
      <a class="btn-download" id="btn-download" href="#" download>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Descargar PDF
      </a>
    </div>

    <iframe id="pdf-frame" title="Visor de informe"></iframe>
  <div id="mobile-viewer" style="display:none;flex:1;flex-direction:column;align-items:center;justify-content:center;gap:24px;padding:32px;background:var(--bg);">
    <svg width="56" height="68" viewBox="0 0 56 68" fill="none" xmlns="http://www.w3.org/2000/svg" opacity="0.4">
      <path d="M34 2H8C4.7 2 2 4.7 2 8v52c0 3.3 2.7 6 6 6h40c3.3 0 6-2.7 6-6V22L34 2z" stroke="#1B2E45" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
      <polyline points="34 2 34 22 54 22" stroke="#1B2E45" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
      <line x1="16" y1="40" x2="40" y2="40" stroke="#1B2E45" stroke-width="3" stroke-linecap="round"/>
      <line x1="16" y1="52" x2="30" y2="52" stroke="#1B2E45" stroke-width="3" stroke-linecap="round"/>
    </svg>
    <div style="text-align:center;">
      <div id="mobile-nombre" style="font-family:'Cormorant Garamond',serif;font-size:18px;color:var(--ink);font-weight:500;margin-bottom:6px;"></div>
      <div style="font-size:12px;color:var(--muted);">El visor no está disponible en móvil</div>
    </div>
    <a id="mobile-open-btn" href="#" target="_blank"
       style="display:flex;align-items:center;gap:10px;background:var(--navy);color:#fff;padding:14px 28px;border-radius:6px;font-size:15px;font-weight:500;text-decoration:none;letter-spacing:0.3px;">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      Abrir PDF
    </a>
    <a id="mobile-download-btn" href="#" download
       style="font-size:13px;color:var(--muted);text-decoration:underline;">
      Descargar
    </a>
  </div>
  </main>

</div>

<footer>
  <span id="footer-institucion">—</span>
  <span>Generado automáticamente · Sistema de Gestión de Informes</span>
</footer>

<script>
const MANIFEST_URL = 'https://IUDPT-Dashboard.github.io/Dashboard/manifesto.json';

const TIPO_LABELS = {
  'dashboard':  'Matrícula',
  'facturacion': 'Facturación'
};

const TIPO_COLORS = {
  'dashboard':  '#2C4A6E',
  'facturacion': '#2D6A4F'
};

function iconoPDF(color) {
  color = color || '#1B2E45';
  return `<svg width="18" height="22" viewBox="0 0 18 22" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M10 1H3C1.9 1 1 1.9 1 3v16c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V7l-7-6z" stroke="${color}" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    <polyline points="10 1 10 7 16 7" stroke="${color}" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="5" y1="13" x2="13" y2="13" stroke="${color}" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="5" y1="17" x2="10" y2="17" stroke="${color}" stroke-width="1.5" stroke-linecap="round"/>
  </svg>`;
}

const isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);

function cargarInforme(url, nombre) {
  document.getElementById('viewer-nombre').textContent = nombre;
  document.getElementById('btn-download').href = url;
  document.getElementById('btn-download').download = nombre;

  if (isMobile) {
    document.getElementById('pdf-frame').style.display = 'none';
    document.getElementById('mobile-viewer').style.display = 'flex';
    document.getElementById('mobile-nombre').textContent = nombre;
    document.getElementById('mobile-open-btn').href = url;
    document.getElementById('mobile-download-btn').href = url;
    document.getElementById('mobile-download-btn').download = nombre;
  } else {
    document.getElementById('pdf-frame').style.display = 'block';
    document.getElementById('mobile-viewer').style.display = 'none';
    document.getElementById('pdf-frame').src = url;
  }

  document.querySelectorAll('.report-item').forEach(el => {
    el.classList.toggle('active', el.dataset.url === url);
  });
}

async function init() {
  try {
    const res = await fetch(MANIFEST_URL + '?t=' + Date.now());
    if (!res.ok) throw new Error('No se pudo cargar el manifiesto');
    const data = await res.json();

    document.getElementById('footer-institucion').textContent = data.institucion || 'IUDPT';
    document.title = 'Dashboard · IUDPT';
    document.getElementById('ultima-actualizacion').textContent = data.ultima_actualizacion || '—';

    const lista   = document.getElementById('report-list');
    const informes = data.informes || [];

    if (informes.length === 0) {
      lista.innerHTML = '<div class="state-msg"><p>No hay informes disponibles.</p></div>';
      return;
    }

    // Clasificar: hoy = acceso rápido, manuales siempre en acceso rápido, resto = historial
    const hoy = new Date().toISOString().slice(0, 10);

    const rapidos    = [];   // PDFs de hoy + todos los manuales
    const historicos = [];   // Todo lo demás agrupado por fecha

    informes.forEach(inf => {
      const tipo     = inf.tipo || 'dashboard';
      const esHoy    = (inf.fecha_iso === hoy);
      const esManual = (tipo === 'manual');
      if (esHoy || esManual) {
        rapidos.push(inf);
      } else {
        historicos.push(inf);
      }
    });

    lista.innerHTML = '';
    let primerUrl = null, primerNombre = null;

    // ── SECCIÓN ACCESO RÁPIDO ────────────────────────────────────────────
    if (rapidos.length > 0) {
      const secLabel = document.createElement('div');
      secLabel.style.cssText = `padding:12px 24px 4px;font-size:10px;letter-spacing:1.5px;
        text-transform:uppercase;color:var(--muted);font-weight:500;`;
      secLabel.textContent = 'Acceso rápido';
      lista.appendChild(secLabel);

      rapidos.forEach((inf, idx) => {
        const tipo  = inf.tipo || 'dashboard';
        const color = TIPO_COLORS[tipo] || '#1B2E45';
        const label = TIPO_LABELS[tipo] || tipo;
        if (!primerUrl) { primerUrl = inf.url; primerNombre = inf.nombre; }

        const item = document.createElement('div');
        item.className = 'report-item' + (idx === 0 ? ' active' : '');
        item.dataset.url = inf.url;
        item.innerHTML = `
          <div class="report-icon">${iconoPDF(color)}</div>
          <div class="report-info">
            <div class="report-date" style="color:${color};font-weight:500;">${label} · ${inf.fecha_display || ''}</div>
            <div class="report-name">${inf.nombre}</div>
          </div>
          ${idx === 0 ? '<span class="badge-nuevo">Nuevo</span>' : ''}
        `;
        item.addEventListener('click', () => cargarInforme(inf.url, inf.nombre));
        lista.appendChild(item);
      });
    }

    // ── SECCIÓN HISTORIAL (colapsable) ───────────────────────────────────
    if (historicos.length > 0) {
      // Separador
      const sep = document.createElement('div');
      sep.style.cssText = `margin:8px 16px;border-top:1px solid var(--border);`;
      lista.appendChild(sep);

      // Botón toggle
      const toggleBtn = document.createElement('div');
      toggleBtn.style.cssText = `padding:10px 24px 4px;font-size:10px;letter-spacing:1.5px;
        text-transform:uppercase;color:var(--muted);font-weight:500;cursor:pointer;
        display:flex;align-items:center;justify-content:space-between;user-select:none;`;
      toggleBtn.innerHTML = `<span>Historial</span><span id="hist-arrow" style="font-size:12px;transition:transform .2s;">▼</span>`;
      lista.appendChild(toggleBtn);

      // Contenedor colapsable
      const histContainer = document.createElement('div');
      histContainer.id = 'hist-container';
      histContainer.style.cssText = `overflow:hidden;max-height:0;transition:max-height .3s ease;`;
      lista.appendChild(histContainer);

      // Agrupar por fecha
      const grupos = {};
      historicos.forEach(inf => {
        const key = inf.fecha_iso || inf.fecha_display || inf.nombre;
        if (!grupos[key]) grupos[key] = { fecha_display: inf.fecha_display || key, items: [] };
        grupos[key].items.push(inf);
      });

      let primerGrupo = true;
      Object.entries(grupos).forEach(([key, grupo]) => {
        const fechaEl = document.createElement('div');
        fechaEl.style.cssText = `padding:${primerGrupo?'6px':'10px'} 24px 4px;font-size:11px;
          color:var(--muted);font-style:italic;`;
        fechaEl.textContent = grupo.fecha_display;
        histContainer.appendChild(fechaEl);
        primerGrupo = false;

        grupo.items.forEach(inf => {
          const tipo  = inf.tipo || 'dashboard';
          const color = TIPO_COLORS[tipo] || '#1B2E45';
          const label = TIPO_LABELS[tipo] || tipo;
          if (!primerUrl) { primerUrl = inf.url; primerNombre = inf.nombre; }

          const item = document.createElement('div');
          item.className = 'report-item';
          item.dataset.url = inf.url;
          item.innerHTML = `
            <div class="report-icon">${iconoPDF(color)}</div>
            <div class="report-info">
              <div class="report-date" style="color:${color};font-weight:500;">${label}</div>
              <div class="report-name">${inf.nombre}</div>
            </div>
          `;
          item.addEventListener('click', () => cargarInforme(inf.url, inf.nombre));
          histContainer.appendChild(item);
        });
      });

      // Toggle logic
      let abierto = false;
      toggleBtn.addEventListener('click', () => {
        abierto = !abierto;
        histContainer.style.maxHeight = abierto ? histContainer.scrollHeight + 'px' : '0';
        document.getElementById('hist-arrow').style.transform = abierto ? 'rotate(180deg)' : '';
      });
    }

    if (primerUrl) cargarInforme(primerUrl, primerNombre);

  } catch (err) {
    document.getElementById('report-list').innerHTML =
      `<div class="state-msg"><p>No se pudieron cargar los informes.</p>
       <p style="font-size:11px;margin-top:4px">${err.message}</p></div>`;
    console.error(err);
  }
}

init();
</script>
</body>
</body>
